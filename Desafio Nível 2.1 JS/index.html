<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/scripts.js" defer></script>
  </head>
  <body>
    <div id="container">
      <div id="todo-container">
        <div id="todo-buttons">

          <ul id="lista"></ul>
        </div>
      </div>
    </div>
  </body>
</html>
